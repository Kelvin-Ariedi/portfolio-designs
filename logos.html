<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logos — Kelvin Ariedi</title>
  <link rel="stylesheet" href="work.css">
  <style>
    /* ── Logo grid ── */
    .logos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    /* ── Logo card ── */
    .logo-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,9,219,.07), 0 1px 3px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .logo-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 44px rgba(0,9,219,.13), 0 4px 12px rgba(0,0,0,.07);
    }

    /* ── Logo display area ── */
    .logo-display {
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px;
      position: relative;
      overflow: hidden;
      transition: background .3s ease;
    }
    /* subtle inner vignette */
    .logo-display::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.12) 100%);
      pointer-events: none;
    }
    .logo-display img {
      max-width: 100%;
      max-height: 140px;
      object-fit: contain;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.18));
      transition: transform var(--transition);
    }
    .logo-card:hover .logo-display img { transform: scale(1.04); }

    /* placeholder icon when no image */
    .logo-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px; height: 80px;
      border-radius: 20px;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
    }
    .logo-placeholder svg {
      width: 36px; height: 36px;
      stroke: rgba(255,255,255,.6); fill: none;
      stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round;
    }

    /* bg toggle buttons */
    .bg-toggles {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 2;
      display: flex;
      gap: 5px;
    }
    .bg-toggle {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.5);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease;
    }
    .bg-toggle:hover  { transform: scale(1.2); border-color: #fff; }
    .bg-toggle.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,.4); }

    /* ── Card body ── */
    .logo-body {
      padding: 20px 22px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .logo-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
    }
    .logo-desc {
      font-size: .875rem;
      line-height: 1.65;
      color: var(--muted);
      flex: 1;
    }

    /* variations strip */
    .variations-strip {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .variation-swatch {
      flex: 1;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
      border: 1px solid rgba(255,255,255,.08);
      cursor: default;
      position: relative;
      overflow: hidden;
    }
    .variation-swatch span {
      position: relative;
      z-index: 1;
    }
    /* coming-soon shimmer */
    .variation-swatch.coming::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.06) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .variations-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .logo-footer {
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <nav class="topbar">
    <a href="../index.html" class="topbar-brand">Kelvin<span>.</span></a>
    <span class="topbar-title">Logos</span>
    <a href="../index.html#portfolio" class="topbar-back">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Back to Portfolio
    </a>
  </nav>

  <!-- Hero -->
  <div class="page-hero anim">
    <div class="eyebrow">Category</div>
    <h1>Logo &amp; Brand Identity</h1>
    <p>Custom logos and visual identity systems — click the colour dots to preview each logo on different backgrounds.</p>
  </div>

  <!-- Grid -->
  <div class="work-grid-wrapper">
    <div class="logos-grid" id="logosGrid"></div>
  </div>

  <!-- Footer -->
  <footer class="work-footer">
    <a href="../index.html#contact">Need a logo? Let's talk →</a>
  </footer>

  <script src="data.js"></script>
  <script>
    const grid = document.getElementById('logosGrid');

    /* bg colour options for the toggle dots */
    const bgOptions = [
      { color: null,      label: 'Brand' },   /* uses data.bg */
      { color: '#ffffff', label: 'Light' },
      { color: '#0a0a0f', label: 'Dark'  },
    ];

    if (!portfolioData.logos.length) {
      grid.innerHTML = `
        <div class="state-empty">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          <p>Logos coming soon.</p>
        </div>`;
    } else {
      portfolioData.logos.forEach((logo, i) => {
        const card = document.createElement('article');
        card.className = 'logo-card anim';
        card.style.animationDelay = (i * 80) + 'ms';

        const brandBg = logo.bg || '#0009DB';

        /* build bg-toggle dots */
        const togglesHTML = bgOptions.map((opt, ti) => {
          const col = opt.color || brandBg;
          return `<div
            class="bg-toggle ${ti === 0 ? 'active' : ''}"
            style="background:${col}"
            title="${opt.label} background"
            onclick="setBg(${i}, '${col}', this)"
          ></div>`;
        }).join('');

        /* variations strip — coming soon placeholders */
        const variationColors = [brandBg, '#ffffff', '#0a0a0f'];
        const variationLabels = ['Colour', 'Light', 'Dark'];
        const variationsHTML = variationColors.map((c, vi) =>
          `<div class="variation-swatch coming" style="background:${c}">
             <span>${variationLabels[vi]}</span>
           </div>`
        ).join('');

        card.innerHTML = `
          <div class="logo-display" id="logo-display-${i}" style="background:${brandBg}">
            <div class="bg-toggles">${togglesHTML}</div>
            ${logo.image
              ? `<img src="${logo.image}" alt="${logo.name} logo" onerror="this.parentElement.querySelector('.logo-placeholder') && this.remove(); showPlaceholder(${i})">`
              : `<div class="logo-placeholder"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>`
            }
          </div>
          <div class="logo-body">
            <div class="logo-header">
              <h2 class="logo-name">${logo.name}</h2>
              <span class="tag">${logo.industry}</span>
            </div>
            <p class="logo-desc">${logo.description}</p>
            <p class="variations-label">Variations</p>
            <div class="variations-strip">${variationsHTML}</div>
            <div class="logo-footer">
              <a href="../index.html#contact" class="btn-primary">
                Request Similar
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function setBg(index, color, el) {
      document.getElementById(`logo-display-${index}`).style.background = color;
      /* update active dot */
      el.closest('.bg-toggles').querySelectorAll('.bg-toggle').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
    }

    function showPlaceholder(index) {
      const display = document.getElementById(`logo-display-${index}`);
      if (!display.querySelector('.logo-placeholder')) {
        display.insertAdjacentHTML('beforeend', `
          <div class="logo-placeholder">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>`);
      }
    }
  </script>
</body>
</html>

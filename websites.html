<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Websites — Kelvin Ariedi</title>
  <link rel="stylesheet" href="work.css">
  <style>
    /* ── Website-specific grid ── */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    /* ── Site card ── */
    .site-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,9,219,.07), 0 1px 3px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .site-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 44px rgba(0,9,219,.13), 0 4px 12px rgba(0,0,0,.07);
    }

    /* ── Preview area ── */
    .site-preview {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: #e8e9ff;
      cursor: pointer;
    }

    /* thumbnail */
    .site-thumb {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity .4s ease;
      z-index: 2;
      background: linear-gradient(135deg, #e8e9ff, #c8caff);
    }
    /* placeholder gradient shown when no image */
    .site-thumb-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8e9ff 0%, #c8caff 100%);
      z-index: 1;
    }
    .site-thumb-placeholder svg {
      width: 40px; height: 40px;
      stroke: rgba(0,9,219,.25); fill: none;
      stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* iframe */
    .site-iframe {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      transform: scale(1);
      transform-origin: top left;
      opacity: 0;
      transition: opacity .45s ease;
      z-index: 1;
      pointer-events: none;
      background: #fff;
    }

    /* iframe active state (on hover) */
    .site-preview.previewing .site-thumb  { opacity: 0; z-index: 1; }
    .site-preview.previewing .site-iframe { opacity: 1; z-index: 2; pointer-events: auto; }

    /* loading spinner overlay */
    .site-loader {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(240,240,246,.7);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events: none;
    }
    .site-preview.loading .site-loader { opacity: 1; }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(0,9,219,.15);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* hover cue badge */
    .preview-badge {
      position: absolute;
      bottom: 10px; right: 10px;
      z-index: 4;
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: rgba(0,9,219,.85);
      backdrop-filter: blur(6px);
      color: #fff;
      padding: 4px 10px;
      border-radius: 100px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: none;
    }
    .site-card:hover .preview-badge { opacity: 1; transform: translateY(0); }

    /* iframe error fallback */
    .iframe-blocked {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(240,240,246,.95);
      text-align: center;
      padding: 20px;
    }
    .iframe-blocked svg { width: 32px; height: 32px; stroke: var(--muted); fill:none; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; }
    .iframe-blocked p { font-size: .8rem; color: var(--muted); }
    .site-preview.blocked .iframe-blocked { display: flex; }
    .site-preview.blocked .site-loader    { opacity: 0; }

    /* ── Card body ── */
    .site-body {
      padding: 20px 22px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .site-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
    }
    .site-desc {
      font-size: .875rem;
      line-height: 1.65;
      color: var(--muted);
      flex: 1;
    }
    .site-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .site-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      gap: 10px;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <nav class="topbar">
    <a href="../index.html" class="topbar-brand">Kelvin<span>.</span></a>
    <span class="topbar-title">Websites</span>
    <a href="../index.html#portfolio" class="topbar-back">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Back to Portfolio
    </a>
  </nav>

  <!-- Hero -->
  <div class="page-hero anim">
    <div class="eyebrow">Category</div>
    <h1>Websites &amp; Web Apps</h1>
    <p>Responsive, performant sites and full-stack web applications — hover any card to preview the live site.</p>
  </div>

  <!-- Grid -->
  <div class="work-grid-wrapper">
    <div class="sites-grid" id="sitesGrid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="work-footer">
    <a href="../index.html#contact">Have a project in mind? Let's talk →</a>
  </footer>

  <script src="data.js"></script>
  <script>
    const grid = document.getElementById('sitesGrid');

    if (!portfolioData.websites.length) {
      grid.innerHTML = `
        <div class="state-empty">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <p>Projects coming soon.</p>
        </div>`;
    } else {
      portfolioData.websites.forEach((site, i) => {
        const card = document.createElement('article');
        card.className = 'site-card anim';
        card.style.animationDelay = (i * 80) + 'ms';

        const tagsHTML = site.tags.map(t => `<span class="tag">${t}</span>`).join('');

        card.innerHTML = `
          <div class="site-preview" id="preview-${i}">
            <div class="site-thumb-placeholder">
              <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div>
            <img
              class="site-thumb"
              src="${site.thumbnail}"
              alt="${site.name} screenshot"
              onerror="this.style.display='none'"
            >
            <iframe
              class="site-iframe"
              id="iframe-${i}"
              title="${site.name} live preview"
              sandbox="allow-scripts allow-same-origin"
              loading="lazy"
            ></iframe>
            <div class="site-loader"><div class="spinner"></div></div>
            <div class="iframe-blocked">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
              <p>This site doesn't allow embedding.<br>Open it directly ↓</p>
            </div>
            <span class="preview-badge">Live Preview</span>
          </div>
          <div class="site-body">
            <h2 class="site-name">${site.name}</h2>
            <p class="site-desc">${site.description}</p>
            <div class="site-tags">${tagsHTML}</div>
            <div class="site-actions">
              <a href="${site.url}" target="_blank" rel="noopener" class="btn-primary">
                Visit Site
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
              <button class="btn-ghost" onclick="togglePreview(${i}, '${site.url}')">
                Preview
              </button>
            </div>
          </div>
        `;
        grid.appendChild(card);

        /* hover auto-preview on desktop */
        const preview = card.querySelector('.site-preview');
        let hoverTimer;
        preview.addEventListener('mouseenter', () => {
          hoverTimer = setTimeout(() => loadIframe(i, site.url), 600);
        });
        preview.addEventListener('mouseleave', () => {
          clearTimeout(hoverTimer);
          /* keep iframe loaded but revert visual */
          preview.classList.remove('previewing');
        });
      });
    }

    /* ── Load iframe logic ── */
    function loadIframe(index, url) {
      const preview = document.getElementById(`preview-${index}`);
      const iframe  = document.getElementById(`iframe-${index}`);
      if (preview.classList.contains('blocked')) return;

      if (!iframe.src || iframe.src === 'about:blank' || iframe.src === '') {
        preview.classList.add('loading');
        iframe.src = url;

        /* detect block via load event timeout */
        let loaded = false;
        iframe.onload = () => {
          loaded = true;
          preview.classList.remove('loading');
          preview.classList.add('previewing');
        };
        setTimeout(() => {
          if (!loaded) {
            preview.classList.remove('loading');
            preview.classList.add('blocked');
          }
        }, 6000);
      } else {
        preview.classList.add('previewing');
      }
    }

    function togglePreview(index, url) {
      const preview = document.getElementById(`preview-${index}`);
      if (preview.classList.contains('previewing')) {
        preview.classList.remove('previewing');
      } else {
        loadIframe(index, url);
      }
    }
  </script>
</body>
</html>

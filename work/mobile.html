<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile Apps — Kelvin Ariedi</title>
  <link rel="stylesheet" href="work.css">
  <style>
    .mobile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 28px;
    }

    /* ── App card ── */
    .app-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,9,219,.07), 0 1px 3px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .app-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 44px rgba(0,9,219,.13), 0 4px 12px rgba(0,0,0,.07);
    }

    /* mockup area */
    .app-mockup-area {
      height: 240px;
      background: linear-gradient(155deg, #e8e9ff 0%, #f0f0ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    /* subtle dot pattern */
    .app-mockup-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,9,219,.07) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .app-mockup-area img {
      max-height: 100%;
      max-width: 160px;
      object-fit: contain;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 8px 24px rgba(0,9,219,.18));
      transition: transform var(--transition);
    }
    .app-card:hover .app-mockup-area img { transform: translateY(-4px) scale(1.02); }

    /* phone frame placeholder */
    .phone-frame-placeholder {
      position: relative;
      z-index: 1;
      width: 110px;
      height: 190px;
      background: #fff;
      border-radius: 22px;
      border: 2.5px solid rgba(0,9,219,.2);
      box-shadow: 0 8px 30px rgba(0,9,219,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .phone-frame-placeholder::before {
      content: '';
      position: absolute;
      top: 10px;
      width: 40px; height: 6px;
      background: rgba(0,9,219,.15);
      border-radius: 100px;
    }
    .phone-frame-placeholder svg {
      width: 32px; height: 32px;
      stroke: rgba(0,9,219,.2); fill: none;
      stroke-width: 1.2; stroke-linecap: round;
    }

    /* card body */
    .app-body {
      padding: 20px 22px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .app-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
    }
    .app-desc {
      font-size: .875rem;
      line-height: 1.65;
      color: var(--muted);
      flex: 1;
    }
    .app-platforms { display: flex; gap: 6px; flex-wrap: wrap; }
    .app-footer {
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
  
    /* ── Category navigation strip ── */
    .cat-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 24px;
      background: rgba(240,240,246,.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,9,219,.08);
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .cat-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .02em;
      color: #5a6a7a;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1.5px solid rgba(0,9,219,.15);
      background: transparent;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .cat-nav-btn svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .cat-nav-btn:hover {
      color: #0009DB;
      border-color: #0009DB;
      background: rgba(0,9,219,.05);
    }
    .cat-nav-btn.active {
      color: #fff;
      background: #0009DB;
      border-color: #0009DB;
      box-shadow: 0 4px 14px rgba(0,9,219,.25);
    }
    @media (max-width: 600px) {
      .cat-nav { gap: 6px; padding: 10px 12px; top: 60px; }
      .cat-nav-btn { font-size: .72rem; padding: 5px 11px; }
    }

  </style>
</head>
<body>

  <nav class="topbar">
    <a href="../index.html" class="topbar-brand">Kelvin<span>.</span></a>
    <span class="topbar-title">Mobile Apps</span>
    <a href="../index.html#portfolio" class="topbar-back">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Back to Portfolio
    </a>
  </nav>

  <div class="page-hero anim">
    <div class="eyebrow">Category</div>
    <h1>Mobile App Design &amp; Dev</h1>
    <p>End-to-end mobile experiences — from UI/UX design through to deployment on Android and iOS.</p>
  </div>

  <div class="work-grid-wrapper">
    <div class="mobile-grid" id="mobileGrid"></div>
  </div>

  <footer class="work-footer">
    <a href="../index.html#contact">Have an app idea? Let's talk →</a>
  </footer>

  <script src="data.js"></script>
  <script>
    const grid = document.getElementById('mobileGrid');

    if (!portfolioData.mobile.length) {
      grid.innerHTML = `
        <div class="state-empty">
          <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          <p>App projects coming soon.</p>
        </div>`;
    } else {
      portfolioData.mobile.forEach((app, i) => {
        const card = document.createElement('article');
        card.className = 'app-card anim';
        card.style.animationDelay = (i * 80) + 'ms';

        const platformsHTML = app.platform.map(p =>
          `<span class="tag platform-${p.toLowerCase()}">${p}</span>`
        ).join('');

        const mockupHTML = app.mockup
          ? `<img src="${app.mockup}" alt="${app.name} mockup" onerror="this.parentElement.innerHTML=phonePlaceholder()">`
          : `<div class="phone-frame-placeholder"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>`;

        const linkHTML = app.link && app.link !== '#'
          ? `<a href="${app.link}" target="_blank" rel="noopener" class="btn-primary">
               View App
               <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
             </a>`
          : `<span class="btn-ghost" style="cursor:default;opacity:.6">Coming Soon</span>`;

        card.innerHTML = `
          <div class="app-mockup-area">${mockupHTML}</div>
          <div class="app-body">
            <h2 class="app-name">${app.name}</h2>
            <p class="app-desc">${app.description}</p>
            <div class="app-platforms">${platformsHTML}</div>
            <div class="app-footer">
              ${linkHTML}
              <a href="../index.html#contact" class="btn-ghost">Hire Me</a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function phonePlaceholder() {
      return `<div class="phone-frame-placeholder">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </div>`;
    }
  </script>
  <script>
    /* Highlight current category in nav strip */
    (function() {
      var page = 'mobile';
      document.querySelectorAll('.cat-nav-btn').forEach(function(btn) {
        if (btn.dataset.page === page) btn.classList.add('active');
      });
    })();
  </script>

</body>
</html>

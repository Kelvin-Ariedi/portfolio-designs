<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UI Components — Kelvin Ariedi</title>
  <link rel="stylesheet" href="work.css">
  <style>

    /* ══════════════════════════════════════
       UI COMPONENTS PAGE
       Display: 3-col grid, each card has
       a faux-browser chrome + live iframe
    ══════════════════════════════════════ */

    .ui-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 32px;
    }

    /* ── Card shell ── */
    .ui-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,9,219,.07), 0 1px 4px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .ui-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 48px rgba(0,9,219,.13), 0 4px 14px rgba(0,0,0,.07);
    }

    /* ── Faux browser chrome ── */
    .browser-chrome {
      background: #f0f0f4;
      border-bottom: 1px solid rgba(0,9,219,.08);
      padding: 10px 14px 9px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .browser-dots {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }
    .browser-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .browser-dots span:nth-child(1) { background: #ff5f57; }
    .browser-dots span:nth-child(2) { background: #febc2e; }
    .browser-dots span:nth-child(3) { background: #28c840; }

    .browser-bar {
      flex: 1;
      background: #fff;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: .7rem;
      color: #7a7a8a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: .01em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .browser-bar svg {
      width: 10px; height: 10px;
      stroke: #7a7a8a; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── Iframe viewport ── */
    /* ── Iframe viewport ──
       The wrapper renders at INNER_W × INNER_H px then
       is scaled down to fit the card via JS (ResizeObserver).
       height is set dynamically too so nothing overflows.     */
    .ui-viewport {
      position: relative;
      width: 100%;
      /* height set by JS */
      background: #fff;
      overflow: hidden;
      border-radius: 0;
    }

    .ui-iframe-wrap {
      position: absolute;
      top: 0; left: 0;
      /* width/height & transform set by JS */
      transform-origin: top left;
    }

    .ui-iframe {
      display: block;
      border: none;
      /* width/height set by JS */
    }

    /* loading overlay */
    .ui-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f8f8fc;
      z-index: 2;
      transition: opacity .35s ease;
    }
    .ui-loader.hidden { opacity: 0; pointer-events: none; }
    .ui-spinner {
      width: 26px; height: 26px;
      border: 2.5px solid rgba(0,9,219,.12);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .ui-loader-label {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .06em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* full-screen expand button */
    .ui-expand {
      position: absolute;
      top: 8px; right: 8px;
      z-index: 3;
      width: 30px; height: 30px;
      background: rgba(0,9,219,.85);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(.8);
      transition: opacity .22s ease, transform .22s ease;
      text-decoration: none;
      cursor: pointer;
    }
    .ui-expand svg {
      width: 13px; height: 13px;
      stroke: #fff; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }
    .ui-card:hover .ui-expand { opacity: 1; transform: scale(1); }

    /* ── Card body ── */
    .ui-body {
      padding: 18px 22px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ui-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .ui-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.25;
    }
    .ui-desc {
      font-size: .86rem;
      line-height: 1.65;
      color: var(--muted);
      flex: 1;
    }
    .ui-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .difficulty-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid;
      white-space: nowrap;
    }
    .diff-newbie     { color: #1a7a4a; background: rgba(61,220,132,.1);  border-color: rgba(61,220,132,.25); }
    .diff-junior     { color: #0055cc; background: rgba(0,122,255,.1);   border-color: rgba(0,122,255,.22); }
    .diff-inter      { color: #a04000; background: rgba(255,140,0,.1);   border-color: rgba(255,140,0,.25); }
    .diff-advanced   { color: #8b0000; background: rgba(220,20,60,.1);   border-color: rgba(220,20,60,.22); }

    /* source chip */
    .ui-source {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ui-source::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: .5;
    }

    .ui-footer {
      margin-top: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    /* ── Lightbox overlay ── */
    .lb-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0,10,30,.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .lb-overlay.open { opacity: 1; pointer-events: auto; }

    .lb-frame {
      position: relative;
      width: min(92vw, 900px);
      height: min(88vh, 700px);
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.4);
      display: flex;
      flex-direction: column;
      transform: scale(.94);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .lb-overlay.open .lb-frame { transform: scale(1); }

    .lb-chrome {
      background: #f0f0f4;
      border-bottom: 1px solid rgba(0,9,219,.08);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .lb-chrome .browser-dots { flex-shrink: 0; }
    .lb-url {
      flex: 1;
      background: #fff;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: .76rem;
      color: #5a5a6a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-close {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: rgba(0,9,219,.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .18s ease;
      flex-shrink: 0;
    }
    .lb-close:hover { background: rgba(0,9,219,.16); }
    .lb-close svg {
      width: 13px; height: 13px;
      stroke: var(--blue); fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }
    .lb-iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .ui-grid { grid-template-columns: 1fr; gap: 22px; }
    }
  
    /* ── Category navigation strip ── */
    .cat-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 24px;
      background: rgba(240,240,246,.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,9,219,.08);
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .cat-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .02em;
      color: #5a6a7a;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1.5px solid rgba(0,9,219,.15);
      background: transparent;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .cat-nav-btn svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .cat-nav-btn:hover {
      color: #0009DB;
      border-color: #0009DB;
      background: rgba(0,9,219,.05);
    }
    .cat-nav-btn.active {
      color: #fff;
      background: #0009DB;
      border-color: #0009DB;
      box-shadow: 0 4px 14px rgba(0,9,219,.25);
    }
    @media (max-width: 600px) {
      .cat-nav { gap: 6px; padding: 10px 12px; top: 60px; }
      .cat-nav-btn { font-size: .72rem; padding: 5px 11px; }
    }

  </style>
</head>
<body>

  <!-- Top bar -->
  <nav class="topbar">
    <a href="../index.html" class="topbar-brand">Kelvin<span>.</span></a>
    <span class="topbar-title">UI Components</span>
    <a href="../index.html#portfolio" class="topbar-back">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Back to Portfolio
    </a>
  </nav>

  <!-- Hero -->
  <div class="page-hero anim">
    <div class="eyebrow">Category</div>
    <h1>UI Components</h1>
    <p>Precision-crafted HTML &amp; CSS components — pixel-perfect builds from real design specs, live and interactive right inside each card.</p>
  </div>

  <!-- Grid -->
  <div class="work-grid-wrapper">
    <div class="ui-grid" id="uiGrid"></div>
  </div>

  <!-- Footer -->
  <footer class="work-footer">
    <a href="../index.html#contact">Want a custom component? Let's talk →</a>
  </footer>

  <!-- Lightbox -->
  <div class="lb-overlay" id="lightbox" onclick="closeLightbox(event)">
    <div class="lb-frame" id="lbFrame">
      <div class="lb-chrome">
        <div class="browser-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="lb-url" id="lbUrl"></div>
        <button class="lb-close" onclick="closeLightbox(null, true)">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <iframe class="lb-iframe" id="lbIframe" title="Full preview" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const grid = document.getElementById('uiGrid');

    /* Guard: support older data.js that don't have ui array */
    const items = (portfolioData.ui || []);

    if (!items.length) {
      grid.innerHTML = `
        <div class="state-empty">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
          <p>UI components coming soon.</p>
        </div>`;
    } else {
      items.forEach((item, i) => {
        const card = document.createElement('article');
        card.className = 'ui-card anim';
        card.style.animationDelay = (i * 90) + 'ms';

        const tagsHTML = item.tags.map(t => `<span class="tag">${t}</span>`).join('');
        const diffClass = {
          'Newbie':   'diff-newbie',
          'Junior':   'diff-junior',
          'Intermediate': 'diff-inter',
          'Advanced': 'diff-advanced'
        }[item.difficulty] || 'diff-newbie';

        const shortUrl = item.url.replace(/^https?:\/\//, '').replace(/\/$/, '');

        card.innerHTML = `
          <div class="browser-chrome">
            <div class="browser-dots"><span></span><span></span><span></span></div>
            <div class="browser-bar">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/></svg>
              ${shortUrl}
            </div>
          </div>
          <div class="ui-viewport" id="vp-${i}">
            <div class="ui-loader" id="loader-${i}">
              <div class="ui-spinner"></div>
              <span class="ui-loader-label">Loading preview…</span>
            </div>
            <div class="ui-iframe-wrap">
              <iframe
                class="ui-iframe"
                id="iframe-${i}"
                title="${item.name} preview"
                sandbox="allow-scripts allow-same-origin"
                loading="lazy"
              ></iframe>
            </div>
            <a class="ui-expand" onclick="openLightbox('${item.url}', '${item.name}')" title="Full view">
              <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            </a>
          </div>
          <div class="ui-body">
            <div class="ui-header">
              <h2 class="ui-name">${item.name}</h2>
              <span class="difficulty-badge ${diffClass}">${item.difficulty}</span>
            </div>
            <p class="ui-desc">${item.description}</p>
            <div class="ui-tags">${tagsHTML}</div>
            <div class="ui-footer">
              <a href="${item.url}" target="_blank" rel="noopener" class="btn-primary">
                Open Live
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
              <span class="ui-source">${item.source}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);

        /* ── Per-component sizing ──────────────────────────────────────────
           innerW : virtual viewport width the iframe renders at
           innerH : how much of that height to capture in the thumbnail
                    (crops to a nice "above the fold" preview)
           Both default to item.innerW / item.innerH if set in data.js,
           otherwise fall back to sensible defaults.                     */
        const INNER_W  = item.innerW || 600;
        const INNER_H  = item.innerH || 560;

        const iframe = card.querySelector(`#iframe-${i}`);
        const wrap   = card.querySelector('.ui-iframe-wrap');
        const vp     = card.querySelector(`#vp-${i}`);
        const loader = card.querySelector(`#loader-${i}`);

        iframe.style.width  = INNER_W + 'px';
        /* Render tall enough for the full page but crop via viewport height */
        iframe.style.height = (INNER_H * 2) + 'px';
        wrap.style.width    = INNER_W + 'px';
        wrap.style.height   = (INNER_H * 2) + 'px';

        function applyScale() {
          const cardW = vp.offsetWidth || INNER_W;
          const scale = cardW / INNER_W;
          wrap.style.transform = `scale(${scale})`;
          /* Viewport height = only the top INNER_H px of the scaled content */
          vp.style.height = (INNER_H * scale) + 'px';
        }

        applyScale();
        new ResizeObserver(applyScale).observe(vp);

        /* Scroll-on-hover: slowly drift down so user sees more content */
        let scrollAnim;
        vp.addEventListener('mouseenter', () => {
          let pos = 0;
          const maxScroll = INNER_H * (vp.offsetWidth / INNER_W);
          scrollAnim = setInterval(() => {
            pos = Math.min(pos + 0.6, maxScroll * 0.55);
            wrap.style.transform = `scale(${vp.offsetWidth / INNER_W}) translateY(-${pos}px)`;
          }, 16);
        });
        vp.addEventListener('mouseleave', () => {
          clearInterval(scrollAnim);
          /* Smoothly snap back to top */
          wrap.style.transition = 'transform 0.5s ease';
          wrap.style.transform  = `scale(${vp.offsetWidth / INNER_W}) translateY(0)`;
          setTimeout(() => wrap.style.transition = '', 500);
        });

        /* Lazy-load iframe when card enters viewport */
        const observer = new IntersectionObserver(entries => {
          if (entries[0].isIntersecting) {
            observer.disconnect();
            iframe.src = item.url;
            iframe.onload = () => {
              loader.classList.add('hidden');
              setTimeout(() => loader.remove(), 400);
            };
            setTimeout(() => loader.classList.add('hidden'), 8000);
          }
        }, { rootMargin: '200px' });

        observer.observe(card);
      });
    }

    /* ── Lightbox ── */
    function openLightbox(url, name) {
      document.getElementById('lbUrl').textContent = url.replace(/^https?:\/\//, '');
      document.getElementById('lbIframe').src = url;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e, force) {
      if (!force && e && document.getElementById('lbFrame').contains(e.target)) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      /* Clear iframe to stop audio/video */
      setTimeout(() => { document.getElementById('lbIframe').src = ''; }, 350);
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox(null, true);
    });
  </script>
  <script>
    /* Highlight current category in nav strip */
    (function() {
      var page = 'ui';
      document.querySelectorAll('.cat-nav-btn').forEach(function(btn) {
        if (btn.dataset.page === page) btn.classList.add('active');
      });
    })();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Print & Business Cards — Kelvin Ariedi</title>
  <link rel="stylesheet" href="work.css">
  <style>
    .print-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    /* ── Print card ── */
    .print-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,9,219,.07), 0 1px 3px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .print-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 44px rgba(0,9,219,.13), 0 4px 12px rgba(0,0,0,.07);
    }

    /* mockup display */
    .print-mockup-area {
      height: 220px;
      background: linear-gradient(155deg, #f5f5f0 0%, #ece8df 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .print-mockup-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .print-mockup-area img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.15));
      transition: transform var(--transition);
    }
    .print-card:hover .print-mockup-area img { transform: translateY(-3px) rotate(-0.5deg); }

    /* placeholder business card shape */
    .card-placeholder {
      position: relative;
      z-index: 1;
      width: 160px; height: 95px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,.14), 4px 4px 0 rgba(0,9,219,.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-placeholder svg {
      width: 28px; height: 28px;
      stroke: rgba(0,9,219,.2); fill: none;
      stroke-width: 1.2; stroke-linecap: round;
    }

    /* card body */
    .print-body {
      padding: 20px 22px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .print-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
    }
    .print-desc {
      font-size: .875rem;
      line-height: 1.65;
      color: var(--muted);
      flex: 1;
    }
    .print-spec {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted);
      background: #f5f4f2;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,.06);
      width: fit-content;
    }
    .print-spec svg {
      width: 11px; height: 11px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round;
    }
    .print-footer {
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
  
    /* ── Category navigation strip ── */
    .cat-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 24px;
      background: rgba(240,240,246,.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,9,219,.08);
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .cat-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .02em;
      color: #5a6a7a;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1.5px solid rgba(0,9,219,.15);
      background: transparent;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .cat-nav-btn svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .cat-nav-btn:hover {
      color: #0009DB;
      border-color: #0009DB;
      background: rgba(0,9,219,.05);
    }
    .cat-nav-btn.active {
      color: #fff;
      background: #0009DB;
      border-color: #0009DB;
      box-shadow: 0 4px 14px rgba(0,9,219,.25);
    }
    @media (max-width: 600px) {
      .cat-nav { gap: 6px; padding: 10px 12px; top: 60px; }
      .cat-nav-btn { font-size: .72rem; padding: 5px 11px; }
    }

  </style>
</head>
<body>

  <nav class="topbar">
    <a href="../index.html" class="topbar-brand">Kelvin<span>.</span></a>
    <span class="topbar-title">Print</span>
    <a href="../index.html#portfolio" class="topbar-back">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      Back to Portfolio
    </a>
  </nav>

  <div class="page-hero anim">
    <div class="eyebrow">Category</div>
    <h1>Business Cards &amp; Print</h1>
    <p>Print-ready collateral that carries a brand off-screen — crafted for both digital printing and offset production.</p>
  </div>

  <div class="work-grid-wrapper">
    <div class="print-grid" id="printGrid"></div>
  </div>

  <footer class="work-footer">
    <a href="../index.html#contact">Need print work? Let's talk →</a>
  </footer>

  <script src="data.js"></script>
  <script>
    const grid = document.getElementById('printGrid');

    if (!portfolioData.print.length) {
      grid.innerHTML = `
        <div class="state-empty">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2H8l-2 5h12z"/></svg>
          <p>Print projects coming soon.</p>
        </div>`;
    } else {
      portfolioData.print.forEach((item, i) => {
        const card = document.createElement('article');
        card.className = 'print-card anim';
        card.style.animationDelay = (i * 80) + 'ms';

        const mockupHTML = item.mockup
          ? `<img src="${item.mockup}" alt="${item.name} mockup" onerror="this.outerHTML='<div class=\\'card-placeholder\\'><svg viewBox=\\'0 0 24 24\\'><rect x=\\'2\\' y=\\'7\\' width=\\'20\\' height=\\'14\\' rx=\\'2\\'/></svg></div>'">`
          : `<div class="card-placeholder">
               <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2H8l-2 5h12z"/></svg>
             </div>`;

        const linkHTML = item.link && item.link !== '#'
          ? `<a href="${item.link}" target="_blank" rel="noopener" class="btn-primary">
               View Design
               <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
             </a>`
          : `<a href="../index.html#contact" class="btn-primary">
               Request Similar
               <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
             </a>`;

        card.innerHTML = `
          <div class="print-mockup-area">${mockupHTML}</div>
          <div class="print-body">
            <h2 class="print-name">${item.name}</h2>
            <p class="print-desc">${item.description}</p>
            <div class="print-spec">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
              ${item.spec}
            </div>
            <div class="print-footer">
              ${linkHTML}
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }
  </script>
  <script>
    /* Highlight current category in nav strip */
    (function() {
      var page = 'print';
      document.querySelectorAll('.cat-nav-btn').forEach(function(btn) {
        if (btn.dataset.page === page) btn.classList.add('active');
      });
    })();
  </script>

</body>
</html>
